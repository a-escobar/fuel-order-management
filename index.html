// HISTORY TAB — view and navigate past log entries
// ═══════════════════════════════════════════════════════════
function HistoryTab({ config, dailyLog }) {
  const [st,  setSt]  = useState('Puma Juticalpa');
  const [days, setDays] = useState(14);

  const today = getTodayStr();
  const dates = Array.from({ length:days }, (_,i) => addDays(today, -(days-1-i)));

  const invKeys = isJuta(st)
    ? Object.entries(JUTA_SETS).flatMap(([sn,fuels])=>fuels.map(f=>({set:sn,fuel:f})))
    : FUELS.map(f=>({set:null,fuel:f}));

  return (
    <div>
      <div style={S.stBar}>
        {STATIONS.map(s => <button key={s} style={S.stBtn(st===s,STATION_COLORS[s])} onClick={()=>setSt(s)}>{s}</button>)}
      </div>
      <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:16 }}>
        <label style={{ ...S.label, marginBottom:0, whiteSpace:'nowrap' }}>Mostrar días:</label>
        {[7,14,30].map(d=><button key={d} onClick={()=>setDays(d)} style={{ ...S.btn, background:days===d?'#1e3a5f':'white', color:days===d?'white':'#64748b', border:`1px solid ${days===d?'#1e3a5f':'#e2e8f0'}`, padding:'6px 14px', fontSize:13 }}>{d} días</button>)}
      </div>
      <div style={S.card}>
        <div style={S.title}>📅 Historial — {st}</div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', minWidth:600 }}>
            <thead>
              <tr>
                <th style={{ ...S.th, textAlign:'left', minWidth:90 }}>Fecha</th>
                {invKeys.map(({ set:sn, fuel }) => (
                  <th key={(sn||'')+fuel} style={S.th}>
                    {sn && <span style={{ display:'block', fontSize:10, color:SET_COLORS[sn] }}>{sn}</span>}
                    <span style={{ color:FUEL_COLORS[fuel] }}>{FUEL_ICONS[fuel]} {fuel}</span>
                  </th>
                ))}
                <th style={S.th}>Venta Total</th>
                <th style={S.th}>Notas</th>
              </tr>
            </thead>
            <tbody>
              {dates.map(date => {
                const entry = dailyLog[st]?.[date];
                const sales = invKeys.map(({set:sn,fuel}) => getSale(dailyLog,st,date,fuel,sn));
                const totalSale = sales.reduce((t,s)=>t+(s??0),0);
                return (
                  <tr key={date} className="row-hover">
                    <td style={{ ...S.td, textAlign:'left', fontWeight:600 }}>
                      <div>{dayLabel(date)}</div>
                      {entry && <div style={{ fontSize:10, color:'#059669' }}>✅ Datos</div>}
                      {!entry && <div style={{ fontSize:10, color:'#94a3b8' }}>Sin registro</div>}
                    </td>
                    {invKeys.map(({set:sn,fuel},j) => {
                      const m = getMorning(dailyLog,st,date,fuel,sn);
                      const max = getMaxCap(config,st,fuel,sn);
                      const sale = sales[j];
                      return (
                        <td key={(sn||'')+fuel} style={S.td}>
                          {m!==null ? (
                            <>
                              <div style={{ fontWeight:600 }}>{fmt(m)} <span style={{ fontSize:10, color:'#94a3b8' }}>({pct(m,max)}%)</span></div>
                              {sale!==null&&<div style={{ fontSize:11, color:'#059669' }}>↓ {fmt(sale)}</div>}
                            </>
                          ) : <span style={{ color:'#cbd5e1' }}>—</span>}
                        </td>
                      );
                    })}
                    <td style={{ ...S.td, fontWeight:600, color:'#1e3a5f' }}>{totalSale>0?fmtG(totalSale):'—'}</td>
                    <td style={{ ...S.td, fontSize:12, color:'#64748b', textAlign:'left', maxWidth:160 }}>{entry?.notes||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════
function App() {
  // undefined = still checking, null = logged out, object = logged in
  const [currentUser, setCurrentUser] = useState(undefined);
  const [appReady,    setAppReady]    = useState(false);
  const [cloudStatus, setCloudStatus] = useState(IS_CLOUD ? 'connecting' : 'local');
  const [tab,         setTab]         = useState('log');
  const [config,      setConfig]      = useState(defaultConfig());
  const [dailyLog,    setDailyLog]    = useState({});
  const [cisternas,   setCisternas]   = useState(DEFAULT_CISTERNAS);
  const [orderGroups]                 = useState(DEFAULT_ORDER_GROUPS);
  const [nextCisterna, setNextCisterna] = useState({});

  const fromCloudRef = React.useRef(false);
  const saveTimerRef = React.useRef(null);

  // ── Step 1: Watch auth state ──
  useEffect(() => {
    const unsub = onAuthChange(user => setCurrentUser(user));
    return unsub;
  }, []);

  // ── Step 2: Load data once we know who's logged in ──
  useEffect(() => {
    if (currentUser === undefined) return; // still resolving auth
    if (IS_CLOUD && !currentUser) {
      setAppReady(true); // show login screen
      return;
    }
    setAppReady(false);
    setCloudStatus(IS_CLOUD ? 'connecting' : 'local');
    loadStateAsync().then(saved => {
      if (saved) {
        if (saved.config)       setConfig(saved.config);
        if (saved.dailyLog)     setDailyLog(saved.dailyLog);
        if (saved.cisternas)    setCisternas(saved.cisternas);
        if (saved.nextCisterna) setNextCisterna(saved.nextCisterna);
      }
      setAppReady(true);
      if (IS_CLOUD) setCloudStatus('synced');
    }).catch(() => { setAppReady(true); setCloudStatus('error'); });
  }, [currentUser]);

  // ── Step 3: Real-time sync listener (only when authenticated + app ready) ──
  useEffect(() => {
    if (!appReady || !currentUser) return;
    const unsub = subscribeToCloud(data => {
      fromCloudRef.current = true;
      if (data.config)       setConfig(data.config);
      if (data.dailyLog)     setDailyLog(data.dailyLog);
      if (data.cisternas)    setCisternas(data.cisternas);
      if (data.nextCisterna) setNextCisterna(data.nextCisterna);
      setCloudStatus('synced');
      requestAnimationFrame(() => { fromCloudRef.current = false; });
    });
    return unsub;
  }, [appReady, currentUser]);

  // ── Step 4: Save on changes (debounced in cloud mode) ──
  useEffect(() => {
    if (!appReady || !currentUser) return;
    if (fromCloudRef.current) return;
    const payload = { config, dailyLog, cisternas, orderGroups, nextCisterna };
    if (IS_CLOUD) {
      setCloudStatus('saving');
      clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(() => {
        saveStateAsync(payload)
          .then(() => setCloudStatus('synced'))
          .catch(() => setCloudStatus('error'));
      }, 1200);
    } else {
      saveStateAsync(payload);
    }
  }, [config, dailyLog, cisternas, nextCisterna, appReady, currentUser]);

  function exportData() {
    const blob = new Blob([JSON.stringify({ config, dailyLog, cisternas, orderGroups, nextCisterna }, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `gasolineras_backup_${getTodayStr()}.json`;
    a.click();
  }
  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.config)        setConfig(d.config);
        if (d.dailyLog)      setDailyLog(d.dailyLog);
        if (d.cisternas)     setCisternas(d.cisternas);
        if (d.nextCisterna)  setNextCisterna(d.nextCisterna);
        alert('✅ Datos importados.');
      } catch(err) { alert('❌ Error: '+err.message); }
    };
    r.readAsText(file); e.target.value = '';
  }

  const TABS = [
    { id:'log',      label:'📋 Registro Diario' },
    { id:'forecast', label:'📈 Pronóstico 3 Días' },
    { id:'order',    label:'🚛 Planear Pedido' },
    { id:'history',  label:'📅 Historial' },
    { id:'config',   label:'⚙️ Configuración' },
  ];

  // Waiting for auth check
  if (currentUser === undefined) {
    return (
      <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1e3a5f,#2d6296)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:16, color:'white', fontFamily:"-apple-system,sans-serif" }}>
        <div style={{ fontSize:48 }}>⛽</div>
        <div style={{ fontWeight:700, fontSize:20 }}>Gestor de Pedidos</div>
        <div style={{ fontSize:14, opacity:0.7 }}>Verificando acceso…</div>
      </div>
    );
  }

  // Not logged in (cloud mode) → show login screen
  if (IS_CLOUD && !currentUser) return <LoginScreen />;

  // Loading data after login
  if (!appReady) {
    return (
      <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1e3a5f,#2d6296)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:16, color:'white', fontFamily:"-apple-system,sans-serif" }}>
        <div style={{ fontSize:48 }}>⛽</div>
        <div style={{ fontWeight:700, fontSize:20 }}>Gestor de Pedidos</div>
        <div style={{ fontSize:14, opacity:0.7 }}>Cargando datos…</div>
      </div>
    );
  }

  // Cloud status badge config
  const statusMap = {
    local:      { color:'#94a3b8', bg:'rgba(255,255,255,0.10)', icon:'💾', text:'Local' },
    connecting: { color:'#fbbf24', bg:'rgba(251,191,36,0.15)',  icon:'🔄', text:'Conectando…' },
    saving:     { color:'#60a5fa', bg:'rgba(96,165,250,0.15)',  icon:'🔄', text:'Guardando…' },
    synced:     { color:'#34d399', bg:'rgba(52,211,153,0.15)',  icon:'☁️', text:'Sincronizado' },
    error:      { color:'#f87171', bg:'rgba(248,113,113,0.15)', icon:'⚠️', text:'Error de conexión' },
  };
  const st_badge = statusMap[cloudStatus] || statusMap.local;

  return (
    <div style={{ minHeight:'100vh', background:'#f1f5f9', fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif", color:'#1e293b' }}>
      <div style={{ background:'linear-gradient(135deg,#1e3a5f,#2d6296)', color:'white', padding:'14px 24px', display:'flex', alignItems:'center', gap:14, boxShadow:'0 2px 12px rgba(0,0,0,0.2)' }} className="no-print">
        <div style={{ fontSize:28 }}>⛽</div>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:18, lineHeight:1.2 }}>Gestor de Pedidos — Gasolineras</div>
          <div style={{ fontSize:12, opacity:0.75 }}>Puma Juticalpa · Limones · Las Delicias · La Granja · Puma Paz</div>
        </div>
        {/* Cloud sync status */}
        <div style={{ padding:'5px 12px', borderRadius:20, background:st_badge.bg, border:`1px solid ${st_badge.color}40`, fontSize:12, fontWeight:600, color:st_badge.color, whiteSpace:'nowrap' }}>
          {st_badge.icon} {st_badge.text}
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {/* Logged-in user */}
          {IS_CLOUD && currentUser?.email && (
            <div style={{ fontSize:12, opacity:0.7, whiteSpace:'nowrap', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis' }}>
              👤 {currentUser.email}
            </div>
          )}
          <button onClick={exportData} style={{ ...S.btn, background:'rgba(255,255,255,0.15)', color:'white', fontSize:12, padding:'7px 13px', border:'1px solid rgba(255,255,255,0.3)' }}>📥 Exportar</button>
          <label style={{ ...S.btn, background:'rgba(255,255,255,0.15)', color:'white', fontSize:12, padding:'7px 13px', border:'1px solid rgba(255,255,255,0.3)', cursor:'pointer' }}>
            📤 Importar<input type="file" accept=".json" style={{ display:'none' }} onChange={importData} />
          </label>
          {IS_CLOUD && currentUser && (
            <button onClick={()=>signOut()} style={{ ...S.btn, background:'rgba(255,255,255,0.10)', color:'rgba(255,255,255,0.8)', fontSize:12, padding:'7px 13px', border:'1px solid rgba(255,255,255,0.2)' }}>
              Salir
            </button>
          )}
        </div>
      </div>
      <div style={{ background:'white', borderBottom:'1px solid #e2e8f0', display:'flex', padding:'0 20px', overflowX:'auto' }} className="no-print">
        {TABS.map(t => (
          <div key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'13px 16px', cursor:'pointer', fontSize:14, fontWeight:500, whiteSpace:'nowrap', color:tab===t.id?'#1e3a5f':'#64748b', borderBottom:`3px solid ${tab===t.id?'#1e3a5f':'transparent'}`, transition:'all 0.15s', userSelect:'none' }}>
            {t.label}
          </div>
        ))}
      </div>
      <div style={{ padding:20, maxWidth:1200, margin:'0 auto' }}>
        {tab==='config'   && <ConfigTab    config={config} setConfig={setConfig} cisternas={cisternas} setCisternas={setCisternas} />}
        {tab==='log'      && <DailyLogTab  config={config} dailyLog={dailyLog} setDailyLog={setDailyLog} cisternas={cisternas} nextCisterna={nextCisterna} setNextCisterna={setNextCisterna} />}
        {tab==='forecast' && <ForecastTab  config={config} dailyLog={dailyLog} />}
        {tab==='order'    && <OrderTab     config={config} dailyLog={dailyLog} cisternas={cisternas} orderGroups={orderGroups} nextCisterna={nextCisterna} />}
        {tab==='history'  && <HistoryTab   config={config} dailyLog={dailyLog} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
